# Reference Harbor run config for the MLS-Bench adapter.
#
# Default agent is `oracle` so `harbor run -c run_mls-bench.yaml` verifies that
# generated tasks are solvable by their strongest rendered MLS-Bench baseline.

jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0
n_concurrent_trials: 4
quiet: false

environment:
  type: docker
  force_build: true
  delete: true

agents:
  - name: oracle

# Uncomment one agent block for model parity runs.
# agents:
#   - name: codex
#     model_name: openai/gpt-5
# agents:
#   - name: claude-code
#     model_name: anthropic/claude-haiku-4-5
# agents:
#   - name: terminus-2

datasets:
  - path: datasets/mls-bench
