# OpenEvolve defaults for MLS-Bench.
# Use with:
#   mlsbench agent <task> --agent-type openevolve --model <model> \
#     --config configs/react.yaml --openevolve-config configs/openevolve.yaml

max_iterations: 20
random_seed: 42
diff_based_evolution: true
max_code_length: 20000

llm:
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 4096
  timeout: 180
  retries: 3
  retry_delay: 5
  models:
    - name: "qwen/qwen-plus"
      weight: 1.0
  evaluator_models:
    - name: "qwen/qwen-plus"
      weight: 1.0

prompt:
  num_top_programs: 3
  num_diverse_programs: 2
  include_artifacts: true
  use_template_stochasticity: true

database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  migration_interval: 10
  elite_selection_ratio: 0.2
  exploration_ratio: 0.2

evaluator:
  timeout: 3600
  parallel_evaluations: 1
  cascade_evaluation: false
  use_llm_feedback: false

