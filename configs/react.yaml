# Default MLS-Bench runtime config for ReAct-style tool-use agents.
#
# Fill provider keys locally before running agents. Do not commit private keys.

max_steps: 20
max_tests: 3
save_path: runs
data_root: vendor/data
seeds: [42, 123, 456]

# Supported values: docker, apptainer, local
container_runtime: docker
# GPU hardware scaler vs the H100 baseline the tasks are tuned on. Keep 1.0 for
# H100; set 0.5 for H200 (~2x H100) to run the llm-pretrain / llm-rl tasks more
# efficiently (fewer GPUs, larger per-GPU batch / TP=1) with the macro-batch —
# and the result — unchanged. Other tasks are left as-is.
compute_scale: 1.0

thinking:
  enabled: true
  reasoning_effort: high
  budget_tokens: 10000

providers:
  openai:
    api_key: ""
  anthropic:
    api_key: ""
  deepseek:
    api_key: ""
    base_url: "https://api.deepseek.com/v1"
  qwen:
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  gemini:
    api_key: ""
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  openrouter:
    api_key: ""
    base_url: "https://openrouter.ai/api/v1"

