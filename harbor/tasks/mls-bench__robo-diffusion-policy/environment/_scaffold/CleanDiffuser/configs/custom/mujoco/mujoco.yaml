defaults:
  - _self_
  - task: hopper-medium-v2

pipeline_name: custom_policy
mode: train
seed: 42
device: cuda:0

# Environment
normalize_reward: True
discount: 0.99

# Actor
solver: ddpm
diffusion_steps: 5
sampling_steps: 5
predict_noise: True
ema_rate: 0.995
actor_learning_rate: 0.0003

# Critic
hidden_dim: 256
critic_learning_rate: 0.0003

# IQL (used by idql baseline only; harmless as unused keys for DQL)
iql_tau: 0.7
actor_hidden_dim: 256
actor_n_blocks: 3
actor_dropout: 0.1
critic_hidden_dim: 256

# Training
gradient_steps: 1000000
batch_size: 256
ema_update_interval: 5
log_interval: 1000
save_interval: 100000

# Inference
ckpt: latest
num_envs: 50
num_episodes: 3
num_candidates: 50
temperature: 0.5
use_ema: True

# hydra
hydra:
  job:
    chdir: false
